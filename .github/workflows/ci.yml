name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install black isort flake8
      - run: black --check backend/app backend/tests
      - run: isort --check-only backend/app backend/tests

  backend-test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        options: --health-cmd="curl -f http://localhost:6333/health" --health-interval=10s --health-timeout=5s --health-retries=5
      neo4j:
        image: neo4j:5.15
        env:
          NEO4J_AUTH: neo4j/medgraph123
          NEO4J_PLUGINS: '["apoc"]'
        ports: ["7687:7687", "7474:7474"]
        options: --health-cmd="cypher-shell -u neo4j -p medgraph123 'RETURN 1'" --health-interval=15s --health-timeout=10s --health-retries=8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-timeout httpx
        working-directory: .
      - name: Run tests
        run: pytest backend/tests/ -v --tb=short --timeout=60
        env:
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: medgraph123
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_ENV: test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "18", cache: "npm", cache-dependency-path: frontend/package-lock.json}
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test -- --run --reporter=verbose
        working-directory: frontend
        continue-on-error: true

  docker-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env
        run: |
          cp .env.example .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
      - name: Build images
        run: docker-compose build
      - name: Start services
        run: docker-compose up -d
      - name: Wait for services
        run: sleep 45
      - name: Health check
        run: curl -f http://localhost:8000/health
      - name: Frontend check
        run: curl -f http://localhost:3000
      - name: Cleanup
        run: docker-compose down -v
        if: always()
