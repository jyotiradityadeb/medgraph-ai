name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install black isort flake8
      - run: black --check backend/app backend/tests
      - run: isort --check-only backend/app backend/tests

  backend-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        options: --health-cmd="curl -f http://localhost:6333/health" --health-interval=10s --health-timeout=5s --health-retries=5
      neo4j:
        image: neo4j:5.15
        env:
          NEO4J_AUTH: neo4j/ci-password
          NEO4J_PLUGINS: '["apoc"]'
        ports: ["7687:7687", "7474:7474"]
        options: --health-cmd="cypher-shell -u neo4j -p ci-password 'RETURN 1'" --health-interval=15s --health-timeout=10s --health-retries=8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-timeout httpx
        working-directory: .
      - name: Run tests
        run: pytest backend/tests/ -v --tb=short --timeout=60
        env:
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ci-password
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_ENV: test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "18", cache: "npm", cache-dependency-path: frontend/package-lock.json}
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test -- --run --reporter=verbose
        working-directory: frontend
        continue-on-error: true

  docker-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cp .env.example .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "NEO4J_PASSWORD=smoketest" >> .env
          echo "API_KEY=smoketest-key" >> .env

      - name: Build images
        run: docker-compose build

      - name: Start services
        run: docker-compose up -d

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend healthy"; break
            fi
            echo "Waiting... ($i/30)"; sleep 5
          done

      - name: Health check passes
        run: curl -sf http://localhost:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"

      - name: Frontend check
        run: curl -sf http://localhost:3000

      - name: Seed knowledge graph
        run: |
          curl -sf -X POST http://localhost:8000/api/v1/ingest/text \
            -H "Content-Type: application/json" \
            -H "X-API-Key: smoketest-key" \
            -d '{"content": "Warfarin requires careful INR monitoring due to CYP2C9 interactions.", "source": "smoke_test"}'

      - name: Post test query and validate response
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8000/api/v1/query \
            -H "Content-Type: application/json" \
            -H "X-API-Key: smoketest-key" \
            -d '{"query": "Warfarin interactions", "modalities": ["text"], "top_k": 3, "use_graph": true, "graph_depth": 1, "model": "gpt-4o"}' \
            --no-buffer -N)
          echo "$RESPONSE" | grep -q "Clinical Interpretation" || \
            (echo "ERROR: response missing 'Clinical Interpretation'" && exit 1)
          echo "Smoke test passed"

      - name: Cleanup
        run: docker-compose down -v
        if: always()
