apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: medgraph
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: medgraph-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: medgraph-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: medgraph-secrets
                  key: ANTHROPIC_API_KEY
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: medgraph-secrets
                  key: API_KEY
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medgraph-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: QDRANT_HOST
              value: "qdrant"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: FRONTEND_URL
              value: "https://medgraph.example.com"
            - name: APP_ENV
              value: "production"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: medgraph
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
