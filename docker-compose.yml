services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medgraph-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - medgraph-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  neo4j:
    image: neo4j:5.15
    container_name: medgraph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/medgraph123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - medgraph-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medgraph-backend
    env_file:
      - .env
    environment:
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
      - HF_HOME=/app/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/app/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - medgraph-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medgraph-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - medgraph-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  model_cache:
    name: medgraph_model_cache

networks:
  medgraph-network:
    name: medgraph-network
